<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="LaunchFlow is an Amazon product launch pipeline workspace for tracking visible launch stages, dynamic fields, checklist tasks, and launch progress."
    />
    <title>LaunchFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div id="app-root">
      <header id="app-header" class="h-16 sticky top-0 z-50"></header>
      <aside id="app-sidebar" class="w-sidebar_width fixed left-0 top-16 z-20"></aside>
      <section id="app-product-panel" aria-label="Research Pipeline products"></section>
      <main id="app-workspace" class="pl-[260px]"></main>
      <div id="app-context-panel"></div>
    </div>
    <script>
      window.LAUNCHFLOW_SUPABASE = window.LAUNCHFLOW_SUPABASE || {
        url: "",
        anonKey: "",
        uploadProxyUrl: "/api/storage-upload",
        allowLocalFallback: false,
      };
    </script>
    <script type="module">
      const showLaunchFlowModuleError = (error) => {
        console.error("LaunchFlow module failed to load.", error);
        const appRoot = document.getElementById("app-root") || document.body;
        appRoot.innerHTML = `
          <section class="app-error-page" role="alert">
            <div class="app-error-card">
              <h1>LaunchFlow could not load</h1>
              <p>The app module did not load from this deployment. Refresh once, then open the latest Production deployment again if this repeats.</p>
              <button class="button-primary" type="button" data-action="reload-app">Reload app</button>
            </div>
          </section>
        `;
        appRoot.querySelector('[data-action="reload-app"]')?.addEventListener("click", () => window.location.reload());
      };
      import("/js/app.js").catch(showLaunchFlowModuleError);
    </script>
  </body>
</html>
